# ==============================================================================
# Echo HTTPS server block (with SSL)
#
# To activate after ICP filing is done:
#   1. cd /opt/echo
#   2. cp deploy/nginx/conf.d/echo-ssl.conf deploy/nginx/conf.d/echo.conf
#   3. docker compose -f deploy/docker-compose.prod.yml up -d --build nginx
# ==============================================================================

# ---- Redirect HTTP to HTTPS ----
server {
    listen 80;
    server_name echoecho.chat www.echoecho.chat;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name echoecho.chat www.echoecho.chat;

    # ---- SSL ----
    ssl_certificate     /etc/nginx/ssl/echoecho.chat_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/echoecho.chat.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 5m;

    # ---- Frontend ----
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ---- API ----
    location /v1/ {
        proxy_pass http://echo_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        limit_req zone=api_limit burst=20 nodelay;
    }

    # ---- OTP ----
    location /v1/auth/send-otp {
        proxy_pass http://echo_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        limit_req zone=otp_limit burst=2 nodelay;
    }

    # ---- WebSocket ----
    location /v1/ws {
        proxy_pass http://echo_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
