# ==============================================================================
# Echo HTTP server block
# Use this while domain is being filed (备案中) or for HTTP-only access.
# Once SSL is ready, switch to echo-ssl.conf.
# ==============================================================================

server {
    listen 80;
    server_name _;  # Accept any hostname (IP access during ICP filing)

    # Increase max body size for avatar uploads (2MB + overhead)
    client_max_body_size 5m;

    # ---- Frontend static files ----
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # ---- API reverse proxy ----
    location /v1/ {
        proxy_pass http://echo_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ---- OTP endpoint (stricter rate limit) ----
    location /v1/auth/send-otp {
        proxy_pass http://echo_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=otp_limit burst=2 nodelay;
    }

    # ---- WebSocket ----
    location /v1/ws {
        proxy_pass http://echo_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
