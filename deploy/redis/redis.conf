# Echo Redis Configuration
# Production Redis with persistence enabled.

# ---- Network ----
bind 0.0.0.0
port 6379
protected-mode yes
# Password is set via command-line --requirepass in docker-compose.yml.
# Do NOT put plaintext passwords here.

# ---- Persistence (RDB snapshots) ----
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ---- Append-Only File (more durable) ----
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ---- Memory ----
maxmemory 512mb
maxmemory-policy allkeys-lru

# ---- Slow log ----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- General ----
databases 16
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
