# ==============================================================================
# Echo Production Docker Compose
#
# Services:
#   postgres  — PostgreSQL 16 + pgvector (AI embeddings)
#   redis     — Redis 7 (cache + BullMQ queue)
#   app       — NestJS API + Worker (single process)
#   nginx     — Frontend static files + reverse proxy
#
# Usage:
#   1. Copy .env.production.example → .env.production and fill in secrets
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. docker compose -f docker-compose.prod.yml logs -f
# ==============================================================================

services:
  # ---- PostgreSQL + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: echo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-echo_db}
      POSTGRES_USER: ${DB_USER:-echo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # pgvector/pgvector image already has the extension installed,
      # we just need to create it in init scripts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-echo_user} -d ${DB_NAME:-echo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - echo-net
    # No external ports — internal access only, via Docker network

  # ---- Redis (cache + BullMQ queue) ----
  redis:
    image: redis:7-alpine
    container_name: echo-redis
    restart: unless-stopped
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - echo-net

  # ---- Echo API + Worker ----
  app:
    build:
      context: ../..  # Repository root
      dockerfile: Dockerfile
    container_name: echo-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000

      # Database (internal Docker network — no TLS needed)
      DATABASE_URL: postgresql://${DB_USER:-echo_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-echo_db}?sslmode=disable

      # Redis (internal Docker network)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # AI / LLM
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}

      # Alibaba Cloud SMS
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-}
      SMS_CODE_VALID_MINUTES: ${SMS_CODE_VALID_MINUTES:-5}

      # Agent memory storage (use Docker volume path)
      ECHO_MEMORY_BASE_DIR: /app/data/memory

      # COS (Tencent Cloud Object Storage — avatar uploads)
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-}

      # Frontend URL (for CORS / redirects)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

    volumes:
      - app_memory:/app/data/memory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - echo-net
    # Expose port internally for nginx; no host port mapping needed

  # ---- Nginx (frontend + reverse proxy) ----
  nginx:
    build:
      context: ../..  # Repository root
      dockerfile: deploy/nginx/Dockerfile
    container_name: echo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates for HTTPS (activate after ICP filing: rename echo-ssl.conf → echo.conf)
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - echo-net

# ---- Volumes ----
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_memory:
    driver: local

# ---- Networks ----
networks:
  echo-net:
    driver: bridge
