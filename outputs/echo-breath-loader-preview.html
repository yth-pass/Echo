<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Breath Loader – Lottie 预览</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .phone-frame {
      width: 390px;
      height: 844px;
      margin: 0 auto;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(150, 100, 200, 0.15), 0 0 0 2px rgba(255,255,255,0.06);
      background: #0a0a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lottie-container {
      width: 390px;
      height: 844px;
    }
    .info {
      display: flex;
      gap: 24px;
      color: #8888aa;
      font-size: 13px;
    }
    .info span {
      background: rgba(255,255,255,0.04);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .title {
      color: #ccc;
      font-size: 16px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Echo Mobile Color Breath Loader</div>
    <div class="phone-frame">
      <div id="lottie-container"></div>
    </div>
    <div class="info">
      <span>390 x 844</span>
      <span>30 fps</span>
      <span>3.2s loop</span>
      <span>4 bubbles</span>
    </div>
  </div>

  <script>
    lottie.loadAnimation({
      container: document.getElementById('lottie-container'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: './echo-breath-loader.json'
    });
  </script>
</body>
</html>
