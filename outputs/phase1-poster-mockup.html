<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Phase 1 海报 UI 模板</title>
  <style>
    :root {
      --bg: #f7f5f2;
      --card-bg: #ffffff;
      --text: #2d2a26;
      --text-muted: #8a837c;
      --coral: #FF6B6B;
      --coral-light: #fff0f0;
      --violet: #7C5CFC;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 28px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 4px;
      text-align: center;
      color: var(--text);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
    }

    .archetype-switcher {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 720px;
    }

    .archetype-switcher button {
      border: 1px solid #e5e0db;
      background: white;
      border-radius: var(--radius-pill);
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s ease;
      color: var(--text);
    }

    .archetype-switcher button:hover,
    .archetype-switcher button.active {
      background: var(--coral);
      color: white;
      border-color: var(--coral);
    }

    /* Poster canvas 9:16 */
    .poster {
      width: 360px;
      height: 640px;
      border-radius: var(--radius-xl);
      overflow: hidden;
      position: relative;
      box-shadow: 0 24px 60px rgba(0,0,0,0.12);
      background: linear-gradient(170deg, #fff6f4 0%, #fff0f0 45%, #ffe8e8 100%);
      display: flex;
      flex-direction: column;
      padding: 22px 24px 24px;
      transition: background .5s ease;
    }

    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 18px;
      color: var(--coral);
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--coral);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }

    .top-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.7);
      padding: 5px 10px;
      border-radius: var(--radius-pill);
      backdrop-filter: blur(4px);
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .deco-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,107,0.12) 0%, rgba(255,107,107,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .elf-illustration {
      width: 190px;
      height: 190px;
      z-index: 2;
      filter: drop-shadow(0 12px 24px rgba(255,107,107,0.18));
    }

    .elf-name-wrap {
      text-align: center;
      margin-top: 10px;
      z-index: 2;
    }

    .elf-name {
      font-size: 30px;
      font-weight: 800;
      color: var(--coral);
      margin: 0;
      line-height: 1.1;
    }

    .elf-code {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* Declaration */
    .declaration {
      background: rgba(255,255,255,0.65);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      text-align: center;
      backdrop-filter: blur(6px);
      margin-bottom: 14px;
    }

    .declaration-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .declaration-quote {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      margin: 0;
      font-weight: 500;
    }

    .quote-mark {
      color: var(--coral);
      opacity: 0.4;
      font-size: 20px;
      line-height: 0;
      vertical-align: middle;
    }

    /* Keyword sections */
    .keyword-section {
      background: rgba(255,255,255,0.7);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 12px;
      backdrop-filter: blur(4px);
    }

    .keyword-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .keyword-title::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--coral);
    }

    .keyword-title.ideal::before {
      background: var(--violet);
    }

    .keyword-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font-weight: 500;
      white-space: nowrap;
    }

    .pill.personal {
      background: var(--coral-light);
      color: var(--coral);
    }

    .pill.ideal {
      background: #f3f0ff;
      color: var(--violet);
    }

    /* Footer CTA */
    .footer {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: auto;
    }

    .cta-btn {
      flex: 1;
      background: linear-gradient(135deg, var(--coral), #ff8e8e);
      color: white;
      border: none;
      border-radius: var(--radius-pill);
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(255,107,107,0.28);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .share-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,107,107,0.25);
      background: white;
      color: var(--coral);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .qr-block {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .qr {
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-muted);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .qr-text {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.35;
    }

    .disclaimer {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
      opacity: 0.8;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .poster { width: 100%; max-width: 360px; height: auto; aspect-ratio: 9/16; }
    }
  </style>
</head>

    const poster = document.getElementById('poster');
    const buttons = document.querySelectorAll('#switcher button');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const key = btn.dataset.key;
        const data = archetypes[key];
        applyArchetype(data, key);
      });
    });

    function applyArchetype(data, key) {
      poster.style.background = data.gradient;
      poster.style.setProperty('--coral', data.primary);
      poster.style.setProperty('--coral-light', data.light);

      document.querySelector('.elf-name').textContent = data.name;
      document.querySelector('.elf-code').textContent = data.code;
      document.querySelector('.declaration-quote').innerHTML =
        `<span class="quote-mark">“</span>${data.declaration}<span class="quote-mark">”</span>`;

      const personalPills = data.personal.map(k => `<span class="pill personal">${k}</span>`).join('');
      document.querySelector('.keyword-section:first-of-type .keyword-pills').innerHTML = personalPills;

      const idealPills = data.ideal.map(k => `<span class="pill ideal">${k}</span>`).join('');
      document.querySelector('.keyword-section:last-of-type .keyword-pills').innerHTML = idealPills;

      const svg = document.querySelector('.elf-illustration');
      svg.innerHTML = svgLibrary[key];

      // Update decorative ring color
      const ring = document.querySelector('.deco-ring');
      ring.style.background = `radial-gradient(circle, ${data.primary}22 0%, ${data.primary}00 70%)`;

      // Update buttons
      document.querySelector('.cta-btn').style.background = `linear-gradient(135deg, ${data.primary}, ${lighten(data.primary, 20)})`;
      document.querySelector('.cta-btn').style.boxShadow = `0 8px 20px ${data.primary}48`;
      document.querySelector('.share-btn').style.color = data.primary;
      document.querySelector('.share-btn').style.borderColor = `${data.primary}40`;
      document.querySelector('.logo').style.color = data.primary;
      document.querySelector('.logo-icon').style.background = data.primary;
      document.querySelectorAll('.keyword-title::before').forEach ? null : null;
      document.querySelector('.keyword-title').style.setProperty('--coral', data.primary);

      // Update quote marks color
      document.querySelectorAll('.quote-mark').forEach(el => el.style.color = data.primary);
    }

    function lighten(hex, percent) {
      const num = parseInt(hex.replace('#', ''), 16);
      const amt = Math.round(2.55 * percent);
      const R = (num >> 16) + amt;
      const G = (num >> 8 & 0x00FF) + amt;
      const B = (num & 0x0000FF) + amt;
      return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
        (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
        (B < 255 ? B < 1 ? 0 : B : 255))
        .toString(16).slice(1);
    }
